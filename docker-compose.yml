services:
  postgres:
    image: postgres:16
    container_name: financial_insight_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: financial_insight
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - pgdata_financial_insight:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d financial_insight"]
      interval: 5s
      timeout: 5s
      retries: 10

  ingestor:
    build:
      context: .
      dockerfile: Dockerfile.ingestor
    container_name: financial_insight_ingestor
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_DB: financial_insight
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
    volumes:
      - ./:/app
    mem_limit: 512m
    cpus: 1.0
    restart: "no"

volumes:
  pgdata_financial_insight:
